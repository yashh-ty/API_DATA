<!DOCTYPE html>
<html>
<head>
    <title>NIFTY 50 Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #333;
            color: white;
        }
    </style>
</head>

<body>

<h2>NIFTY 50 Data</h2>
<button onclick="loadData()">Load Data</button>

<table id="table">
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Open</th>
            <th>High</th>
            <th>Low</th>
            <th>Close</th>
            <th>Qty</th>
            <th>% Change</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function loadData() {
    const response = await fetch("http://127.0.0.1:8000/nifty50");
    const result = await response.json();

    const tableBody = document.querySelector("#table tbody");
    tableBody.innerHTML = "";

    result.data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
            <td>${row[4]}</td>
            <td>${row[5]}</td>
            <td>${row[6]}</td>
        `;

        tableBody.appendChild(tr);
    });
}
</script>

</body>
</html>
